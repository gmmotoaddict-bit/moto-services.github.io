<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parts — Moto Addict Service</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#E63946;--secondary:#1D3557;--accent:#F4A261;--success:#2A9D8F;--info:#457B9D;--light:#F8F9FA;--muted:#6C757D;--border:#DEE2E6;--white:#FFFFFF;--danger:#DC3545;--yellow:#FFC107;--font:'Sarabun',sans-serif;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,0.10);--shadow-lg:0 4px 20px rgba(0,0,0,0.15);}
html{font-size:16px;}
body{font-family:var(--font);background:var(--light);color:var(--secondary);min-height:100vh;line-height:1.6;}
a{color:var(--primary);text-decoration:none;}a:hover{text-decoration:underline;}
.navbar{background:var(--secondary);color:var(--white);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.navbar-brand{font-size:1.1rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px;}
.navbar-brand span{color:var(--primary);}
.nav-links{display:flex;gap:4px;}
.nav-links a{color:rgba(255,255,255,0.8);padding:6px 10px;border-radius:var(--radius);font-size:0.9rem;font-weight:500;transition:all 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);background:rgba(255,255,255,0.15);text-decoration:none;}
.nav-user{font-size:0.8rem;color:rgba(255,255,255,0.7);text-align:right;}
.nav-user strong{color:var(--white);display:block;}
.page{max-width:1100px;margin:0 auto;padding:1.25rem 1rem;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.page-title{font-size:1.4rem;font-weight:700;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-family:var(--font);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:var(--white);}
.btn-secondary{background:var(--secondary);color:var(--white);}
.btn-success{background:var(--success);color:var(--white);}
.btn-warning{background:var(--yellow);color:var(--secondary);}
.btn-danger{background:var(--danger);color:var(--white);}
.btn-info{background:var(--info);color:var(--white);}
.btn-outline{background:transparent;color:var(--secondary);border:1.5px solid var(--border);}
.btn-sm{padding:4px 10px;font-size:0.8rem;}
.btn:hover{opacity:0.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1.5px solid var(--border);}
.card-title{font-size:1rem;font-weight:700;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.75rem;margin-bottom:1rem;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--border);}
.stat-card.red{border-top-color:var(--primary);}
.stat-card.blue{border-top-color:var(--info);}
.stat-card.green{border-top-color:var(--success);}
.stat-card.orange{border-top-color:var(--accent);}
.stat-card.yellow{border-top-color:var(--yellow);}
.stat-value{font-size:2rem;font-weight:700;line-height:1;}
.stat-label{font-size:0.78rem;color:var(--muted);margin-top:4px;}
.alert{border-radius:var(--radius);padding:0.75rem 1rem;margin-bottom:0.75rem;display:flex;align-items:center;gap:10px;font-size:0.9rem;font-weight:500;}
.alert-danger{background:#FFF2F2;border-left:4px solid var(--danger);color:#7A0000;}
.alert-warning{background:#FFF8E7;border-left:4px solid var(--yellow);color:#6B4C00;}
.alert-success{background:#F0FBF8;border-left:4px solid var(--success);color:#0D4A42;}
.alert-info{background:#EFF5FF;border-left:4px solid var(--info);color:#1A3A5C;}
.alert-icon{font-size:1.2rem;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:0.88rem;}
thead th{background:var(--secondary);color:var(--white);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
tbody tr:hover{background:#F5F7FA;}
tbody td{padding:9px 12px;vertical-align:middle;}
tbody tr.row-alert{background:#FFF2F2;}
tbody tr.row-warn{background:#FFF8E7;}
tbody tr.row-flood{background:#FFF0F0;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.75rem;font-weight:600;white-space:nowrap;}
.badge-red{background:#FFE0E0;color:#C00;}
.badge-green{background:#DCF5F0;color:#0A6058;}
.badge-blue{background:#DDE9F5;color:#1A4A78;}
.badge-yellow{background:#FFF3CC;color:#664D00;}
.badge-orange{background:#FFE8D0;color:#7A3800;}
.badge-gray{background:#EBEBEB;color:#555;}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1rem;overflow-x:auto;}
.tab-btn{padding:10px 18px;border:none;background:none;font-family:var(--font);font-size:0.9rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.2s;}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-btn:hover:not(.active){color:var(--secondary);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-select,.filter-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:0.88rem;background:var(--white);color:var(--secondary);}
.filter-select:focus,.filter-input:focus{outline:none;border-color:var(--info);}
.form-group{margin-bottom:0.9rem;}
.form-label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:4px;color:var(--secondary);}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:0.9rem;transition:border-color 0.2s;}
.form-control:focus{outline:none;border-color:var(--info);}
.form-control.error{border-color:var(--danger);}
textarea.form-control{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.form-check{display:flex;align-items:center;gap:8px;}
.form-check input{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1.5px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1;}
.modal-title{font-size:1.05rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;}
.modal-close:hover{color:var(--danger);}
.modal-body{padding:1.25rem;}
.modal-footer{padding:1rem 1.25rem;border-top:1.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);font-size:1rem;gap:10px;}
.spinner{width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.branch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;}
.branch-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;border-top:4px solid var(--info);}
.branch-card.alert-branch{border-top-color:var(--primary);}
.branch-name{font-weight:700;font-size:1.05rem;margin-bottom:0.75rem;}
.branch-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.branch-stat{text-align:center;background:var(--light);border-radius:6px;padding:6px;}
.branch-stat-val{font-weight:700;font-size:1.3rem;}
.branch-stat-val.red{color:var(--primary);}
.branch-stat-val.green{color:var(--success);}
.branch-stat-val.orange{color:var(--accent);}
.branch-stat-val.blue{color:var(--info);}
.branch-stat-label{font-size:0.72rem;color:var(--muted);}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:0.5rem;}
.empty-text{font-size:1rem;}
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--secondary);color:var(--white);padding:12px 18px;border-radius:var(--radius);font-size:0.9rem;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn 0.3s ease;max-width:320px;}
.toast.toast-success{background:var(--success);}
.toast.toast-error{background:var(--danger);}
.toast.toast-warn{background:var(--accent);color:var(--secondary);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@media(max-width:640px){.form-row{grid-template-columns:1fr;}.nav-links a{padding:6px 7px;font-size:0.82rem;}.stat-cards{grid-template-columns:repeat(2,1fr);}.page-title{font-size:1.15rem;}.modal{border-radius:16px 16px 0 0;align-self:flex-end;max-height:92vh;}.modal-overlay{align-items:flex-end;}table{font-size:0.8rem;}thead th,tbody td{padding:7px 8px;}}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🏍️ <span>Moto</span>&nbsp;Addict</div>
  <div class="nav-links">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="jobs.html">🔧 Job Log</a>
    <a href="sa-report.html">📈 SA Report</a>
    <a href="parts.html" class="active">📦 Parts</a>
    <a href="capacity.html">👷 Capacity</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">📦 ติดตามอะไหล่ (Parts Tracking)</div>
    <button class="btn btn-outline btn-sm" onclick="loadParts()">🔄 รีเฟรช</button>
  </div>

  <!-- Alert Zone -->
  <div id="parts-alert-zone"></div>

  <!-- Summary Stats -->
  <div class="stat-cards" style="margin-bottom:1rem;">
    <div class="stat-card blue">
      <div class="stat-value" id="ps-total">—</div>
      <div class="stat-label">รายการทั้งหมด</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value" id="ps-received">—</div>
      <div class="stat-label">รับเข้าแล้ว</div>
    </div>
    <div class="stat-card red">
      <div class="stat-value" id="ps-pending">—</div>
      <div class="stat-label">รอดำเนินการ</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-value" id="ps-value">—</div>
      <div class="stat-label">มูลค่ารับเข้ารวม</div>
    </div>
  </div>

  <!-- Tabs -->
  <div id="tabs-parts">
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-all">📋 รายการทั้งหมด</button>
      <button class="tab-btn" data-tab="tab-alert">
        🚨 รอดำเนินการ
        <span id="alert-badge" class="badge badge-red" style="display:none;margin-left:4px;"></span>
      </button>
    </div>

    <!-- Tab 1: All Records -->
    <div class="tab-pane active" id="tab-all">
      <div class="filters">
        <select class="filter-select" id="fp-brand" onchange="renderPartsTable()">
          <option value="">— Brand ทั้งหมด —</option>
        </select>
        <select class="filter-select" id="fp-receiver" onchange="renderPartsTable()">
          <option value="">— ผู้รับเรื่อง ทั้งหมด —</option>
        </select>
        <select class="filter-select" id="fp-status" onchange="renderPartsTable()">
          <option value="">— สถานะทั้งหมด —</option>
        </select>
        <input class="filter-input" id="fp-search" placeholder="ค้นหาชื่อลูกค้า / เลขเอกสาร..." oninput="renderPartsTable()">
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="table-all">
          <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
        </div>
      </div>
    </div>

    <!-- Tab 2: Alert - Arrived but pending -->
    <div class="tab-pane" id="tab-alert">
      <div class="alert alert-danger">
        <span class="alert-icon">🚨</span>
        <span>รายการด้านล่างนี้ <strong>อะไหล่รับเข้าแล้ว แต่ยังไม่ได้แจ้งลูกค้า / ยังไม่จัดคิวซ่อม</strong> — กรุณาดำเนินการด่วน</span>
      </div>
      <div class="card" style="padding:0;">
        <div class="table-wrap" id="table-alert">
          <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// ⚙️ CONFIG — แก้แค่บรรทัดนี้ให้ตรงกับ Apps Script ที่ Deploy แล้ว
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhxx7qK8VGQ2E1eQTppJLlI27AOJbTFYIR9WZRP-adHBhUG8cuxO2X0hYp9GzcAptA/exec';

const BRANCHES      = ['หาดใหญ่', 'สุราษ', 'ภูเก็ต'];
const STATUS_COLORS = {
  'รอซ่อม':'yellow','กำลังซ่อม':'blue','รออะไหล่':'orange',
  'รอลูกค้ารับ':'green','เสร็จสิ้น':'gray',
};

// ─── Apps Script API ──────────────────────────────────────────
const Api = {
  async get(action, params = {}) {
    try {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
      });
      return await (await fetch(url.toString(), { redirect: 'follow' })).json();
    } catch (e) { return { ok: false, error: e.message }; }
  },
  async post(action, body = {}) {
    try {
      return await (await fetch(APPS_SCRIPT_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action, ...body }), redirect: 'follow',
      })).json();
    } catch (e) { return { ok: false, error: e.message }; }
  },
};

// ─── UI Helpers ───────────────────────────────────────────────
function showToast(msg, type = 'success') {
  let c = document.getElementById('_tc');
  if (!c) { c = document.createElement('div'); c.id = '_tc'; c.className = 'toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3500);
}
function badge(text, color) { return `<span class="badge badge-${color || STATUS_COLORS[text] || 'gray'}">${text}</span>`; }
function setLoading(el) { el.innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>'; }
function setEmpty(el, msg = 'ไม่มีข้อมูล') { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">${msg}</div></div>`; }
function fmtDate(val) { if (!val) return '—'; const d = new Date(val); return isNaN(d) ? val : d.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit' }); }
function fmtDT(val)   { if (!val) return '—'; const d = new Date(val); return isNaN(d) ? val : d.toLocaleString('th-TH',   { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function initTabs(cId) {
  const c = document.getElementById(cId); if (!c) return;
  c.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
    c.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    const t = document.getElementById(btn.dataset.tab); if (t) t.classList.add('active');
  }));
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});
let allParts = [];

document.addEventListener('DOMContentLoaded', async () => {
  initTabs('tabs-parts');
  await loadParts();
});

async function loadParts() {
  setLoading(document.getElementById('table-all'));
  setLoading(document.getElementById('table-alert'));

  const res = await Api.get('getPartsTracking');
  if (!res.ok) {
    const errHtml = `<div class="alert alert-danger" style="margin:1rem;">
      โหลดข้อมูลไม่ได้: ${res.error}<br>
      <small style="color:var(--muted)">ตรวจสอบ Apps Script URL ใน config.js และ Deploy Web App แล้ว</small>
    </div>`;
    document.getElementById('table-all').innerHTML   = errHtml;
    document.getElementById('table-alert').innerHTML = '';
    return;
  }
  allParts = res.data || [];

  // Populate filter dropdowns from actual data
  const brands    = [...new Set(allParts.map(r => r.brand).filter(Boolean))].sort();
  const receivers = [...new Set(allParts.map(r => r.receiver).filter(Boolean))].sort();
  const statuses  = [...new Set(allParts.map(r => r.status).filter(Boolean))].sort();

  document.getElementById('fp-brand').innerHTML =
    '<option value="">— Brand ทั้งหมด —</option>' +
    brands.map(b => `<option value="${b}">${b}</option>`).join('');

  document.getElementById('fp-receiver').innerHTML =
    '<option value="">— ผู้รับเรื่อง ทั้งหมด —</option>' +
    receivers.map(r => `<option value="${r}">${r}</option>`).join('');

  document.getElementById('fp-status').innerHTML =
    '<option value="">— สถานะทั้งหมด —</option>' +
    statuses.map(s => `<option value="${s}">${s}</option>`).join('');

  updateStats();
  renderPartsTable();
  renderAlertTable();
}

// Alert = parts received (receiveDate filled) but status not marked as done
// ใช้ positive keywords แทน negative regex — robust กว่าถ้าสะกดผิดนิดหน่อย
const DONE_KEYWORDS = ['ส่ง', 'เสร็จ', 'ครบ', 'แจ้ง', 'จัดคิว', 'รับแล้ว', 'ยกเลิก'];
function isArrivalAlert(r) {
  if (!r.receiveDate) return false;
  const st = (r.status || '').trim();
  if (!st) return true; // มี receiveDate แต่ไม่มี status → ต้องดำเนินการ
  return !DONE_KEYWORDS.some(k => st.includes(k));
}

function updateStats() {
  const received = allParts.filter(r => r.receiveDate);
  const pending  = allParts.filter(r => isArrivalAlert(r));
  const totalVal = allParts.reduce((s, r) => s + (r.receiveValue || 0), 0);
  const fmt = n => Number(n || 0).toLocaleString('th-TH', { maximumFractionDigits: 0 });

  document.getElementById('ps-total').textContent    = allParts.length;
  document.getElementById('ps-received').textContent = received.length;
  document.getElementById('ps-pending').textContent  = pending.length;
  document.getElementById('ps-value').textContent    = fmt(totalVal);

  const alertBadge = document.getElementById('alert-badge');
  alertBadge.textContent   = pending.length;
  alertBadge.style.display = pending.length > 0 ? 'inline-block' : 'none';

  const zone = document.getElementById('parts-alert-zone');
  zone.innerHTML = pending.length > 0
    ? `<div class="alert alert-danger">
        <span class="alert-icon">🚨</span>
        <span>มีอะไหล่ <strong>${pending.length} รายการ</strong> รับเข้าแล้วแต่ยังรอดำเนินการ
          — ดูที่แท็บ <strong>"รอดำเนินการ"</strong></span>
       </div>`
    : '';
}

function getStatusColor(status) {
  if (!status) return 'gray';
  const s = status.trim();
  if (['ส่ง', 'เสร็จ', 'ครบ', 'รับแล้ว'].some(k => s.includes(k))) return 'green';
  if (['จัดคิว', 'กำลัง', 'แจ้ง'].some(k => s.includes(k)))         return 'blue';
  if (['รอ', 'รับเข้า', 'สั่ง'].some(k => s.includes(k)))           return 'orange';
  if (['ยกเลิก', 'ไม่มี'].some(k => s.includes(k)))                 return 'red';
  return 'gray';
}

function renderPartsTable() {
  const el       = document.getElementById('table-all');
  const brand    = document.getElementById('fp-brand').value;
  const receiver = document.getElementById('fp-receiver').value;
  const status   = document.getElementById('fp-status').value;
  const search   = document.getElementById('fp-search').value.toLowerCase();

  const items = allParts.filter(r => {
    if (brand    && r.brand    !== brand)    return false;
    if (receiver && r.receiver !== receiver) return false;
    if (status   && r.status   !== status)   return false;
    if (search && !`${r.customer} ${r.docNo} ${r.note} ${r.updateNote}`.toLowerCase().includes(search)) return false;
    return true;
  });

  if (items.length === 0) { setEmpty(el, 'ไม่มีข้อมูลที่ตรงกับเงื่อนไข'); return; }

  const fmt = n => Number(n || 0).toLocaleString('th-TH', { maximumFractionDigits: 0 });

  el.innerHTML = `<table>
    <thead><tr>
      <th>ลำดับ</th>
      <th>เลขที่เอกสาร</th>
      <th>ชื่อลูกค้า</th>
      <th>แบรนด์</th>
      <th>ผู้รับเรื่อง</th>
      <th>สถานะ</th>
      <th>Parts / PO</th>
      <th>วันที่รับเข้า</th>
      <th style="text-align:right">มูลค่า</th>
      <th>หมายเหตุ</th>
    </tr></thead>
    <tbody>${items.map(r => {
      const alert    = isArrivalAlert(r);
      const sc       = getStatusColor(r.status);
      const partsInfo = [r.orderStatus, r.poNo ? `PO: ${r.poNo}` : '', r.soNo ? `SO: ${r.soNo}` : '']
        .filter(Boolean).join('<br>');
      return `<tr class="${alert ? 'row-alert' : ''}">
        <td style="color:var(--muted);font-size:0.78rem">${r.no || ''}</td>
        <td>
          <code style="font-size:0.78rem">${r.docNo || '—'}</code>
          ${r.depositDate ? `<br><small style="color:var(--muted)">มัดจำ: ${r.depositDate}</small>` : ''}
        </td>
        <td><strong>${r.customer || '—'}</strong></td>
        <td>${r.brand ? `<span class="badge badge-blue">${r.brand}</span>` : '—'}</td>
        <td><strong>${r.receiver || '—'}</strong></td>
        <td>
          ${r.status ? `<span class="badge badge-${sc}">${r.status}</span>` : '—'}
          ${alert ? `<br><small style="color:var(--danger)">⚠️ รอดำเนินการ</small>` : ''}
        </td>
        <td style="font-size:0.78rem;line-height:1.6">${partsInfo || '—'}</td>
        <td>
          ${r.receiveDate
            ? `<span style="color:var(--success)">✅ ${r.receiveDate}</span>
               ${r.deliveryDays ? `<br><small style="color:var(--muted)">${r.deliveryDays} วัน</small>` : ''}`
            : '—'}
        </td>
        <td style="text-align:right">${r.receiveValue ? fmt(r.receiveValue) : '—'}</td>
        <td style="font-size:0.78rem;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
            title="${r.updateNote || r.note || ''}">${r.updateNote || r.note || '—'}</td>
      </tr>`;
    }).join('')}</tbody>
    <tfoot style="background:var(--light);font-weight:700;">
      <tr>
        <td colspan="8">รวม ${items.length} รายการ</td>
        <td style="text-align:right">${fmt(items.reduce((s, r) => s + (r.receiveValue || 0), 0))}</td>
        <td></td>
      </tr>
    </tfoot>
  </table>`;
}

function renderAlertTable() {
  const el    = document.getElementById('table-alert');
  const items = allParts.filter(r => isArrivalAlert(r));

  if (items.length === 0) {
    setEmpty(el, '✅ ทุกรายการดำเนินการครบถ้วนแล้ว — ไม่มีค้างงาน');
    return;
  }

  const fmt = n => Number(n || 0).toLocaleString('th-TH', { maximumFractionDigits: 0 });

  el.innerHTML = `<table>
    <thead><tr>
      <th>เลขที่เอกสาร</th>
      <th>ชื่อลูกค้า</th>
      <th>แบรนด์</th>
      <th>ผู้รับเรื่อง</th>
      <th>วันที่รับเข้า</th>
      <th>จำนวนวัน</th>
      <th style="text-align:right">มูลค่า</th>
      <th>สถานะปัจจุบัน</th>
      <th>อัพเดต / หมายเหตุ</th>
    </tr></thead>
    <tbody>${items.map(r => {
      const sc = getStatusColor(r.status);
      return `<tr class="row-alert">
        <td>
          <code style="font-size:0.78rem">${r.docNo || '—'}</code>
          ${r.receiptDocNo ? `<br><small style="color:var(--muted)">ใบรับ: ${r.receiptDocNo}</small>` : ''}
        </td>
        <td><strong>${r.customer || '—'}</strong></td>
        <td>${r.brand ? `<span class="badge badge-blue">${r.brand}</span>` : '—'}</td>
        <td><strong style="color:var(--primary)">${r.receiver || '—'}</strong></td>
        <td><span style="color:var(--success)">✅ ${r.receiveDate}</span></td>
        <td>${r.deliveryDays || '—'}</td>
        <td style="text-align:right">${r.receiveValue ? fmt(r.receiveValue) : '—'}</td>
        <td>${r.status ? `<span class="badge badge-${sc}">${r.status}</span>` : '—'}</td>
        <td style="font-size:0.78rem;color:var(--muted)">${r.updateNote || r.note || '—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}
</script>

<style>
/* เพิ่ม left-border บน row-alert เพื่อความชัดเจน */
tbody tr.row-alert { border-left: 3px solid var(--danger); }
</style>
</body>
</html>
