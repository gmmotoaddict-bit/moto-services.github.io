<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA Report — Moto Addict Service</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🏍️ <span>Moto</span>&nbsp;Addict</div>
  <div class="nav-links">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="jobs.html">🔧 Job Log</a>
    <a href="sa-report.html" class="active">📈 SA Report</a>
    <a href="parts.html">📦 Parts</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">📈 SA Performance Report</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <select class="filter-select" id="sheet-select" onchange="loadReport()">
        <option value="">กำลังโหลด...</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="loadReport()">🔄</button>
    </div>
  </div>

  <!-- KPI Strip -->
  <div class="stat-cards" id="sa-kpi" style="margin-bottom:1rem;">
    <div class="stat-card blue">
      <div class="stat-value" id="k-tp">—</div>
      <div class="stat-label">TP (คัน)</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value" id="k-jobs">—</div>
      <div class="stat-label">Job เปิด-ปิด</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-value" id="k-labor">—</div>
      <div class="stat-label">ค่าแรงรวม</div>
    </div>
    <div class="stat-card red">
      <div class="stat-value" id="k-revenue">—</div>
      <div class="stat-label">รายได้รวม</div>
    </div>
  </div>

  <!-- SA by Brand Table -->
  <div class="card" style="padding:0;">
    <div class="card-header" style="padding:1rem 1.25rem;">
      <div class="card-title">รายละเอียดแยกตาม Brand / SA</div>
    </div>
    <div class="table-wrap" id="sa-table">
      <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
    </div>
  </div>

  <!-- Manager Summary KPI (Sheet 1) -->
  <div class="card" style="margin-top:1rem;">
    <div class="card-header">
      <div class="card-title">🎯 เป้าหมายรายบุคคล (จากตารางสรุปยอดผู้จัดการ)</div>
    </div>
    <div class="table-wrap" id="target-table">
      <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// ⚙️ CONFIG — แก้แค่บรรทัดนี้ให้ตรงกับ Apps Script ที่ Deploy แล้ว
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhxx7qK8VGQ2E1eQTppJLlI27AOJbTFYIR9WZRP-adHBhUG8cuxO2X0hYp9GzcAptA/exec';

const BRANCHES      = ['หาดใหญ่', 'สุราษ', 'ภูเก็ต'];
const STATUS_COLORS = {
  'รอซ่อม':'yellow','กำลังซ่อม':'blue','รออะไหล่':'orange',
  'รอลูกค้ารับ':'green','เสร็จสิ้น':'gray',
};

// ─── Apps Script API ──────────────────────────────────────────
const Api = {
  async get(action, params = {}) {
    try {
      const url = new URL(APPS_SCRIPT_URL);
      url.searchParams.set('action', action);
      Object.entries(params).forEach(([k, v]) => {
        if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
      });
      return await (await fetch(url.toString(), { redirect: 'follow' })).json();
    } catch (e) { return { ok: false, error: e.message }; }
  },
  async post(action, body = {}) {
    try {
      return await (await fetch(APPS_SCRIPT_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action, ...body }), redirect: 'follow',
      })).json();
    } catch (e) { return { ok: false, error: e.message }; }
  },
};

// ─── UI Helpers ───────────────────────────────────────────────
function showToast(msg, type = 'success') {
  let c = document.getElementById('_tc');
  if (!c) { c = document.createElement('div'); c.id = '_tc'; c.className = 'toast-container'; document.body.appendChild(c); }
  const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3500);
}
function badge(text, color) { return `<span class="badge badge-${color || STATUS_COLORS[text] || 'gray'}">${text}</span>`; }
function setLoading(el) { el.innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>'; }
function setEmpty(el, msg = 'ไม่มีข้อมูล') { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">${msg}</div></div>`; }
function fmtDate(val) { if (!val) return '—'; const d = new Date(val); return isNaN(d) ? val : d.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'2-digit' }); }
function fmtDT(val)   { if (!val) return '—'; const d = new Date(val); return isNaN(d) ? val : d.toLocaleString('th-TH',   { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function initTabs(cId) {
  const c = document.getElementById(cId); if (!c) return;
  c.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
    c.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    const t = document.getElementById(btn.dataset.tab); if (t) t.classList.add('active');
  }));
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});
let sheetNames = [];

document.addEventListener('DOMContentLoaded', async () => {
  // โหลด sheet names จาก Apps Script
  const res = await Api.get('getSheetNames', { ssId: 'saReport' });
  if (res.ok) {
    sheetNames = res.data || [];
    const sel  = document.getElementById('sheet-select');
    sel.innerHTML = sheetNames.length > 0
      ? sheetNames.map(n => `<option value="${n}">${n}</option>`).join('')
      : '<option value="">ไม่พบ Sheet</option>';
  } else {
    document.getElementById('sheet-select').innerHTML = '<option value="">โหลดไม่ได้</option>';
  }

  await Promise.all([loadReport(), loadManagerTargets()]);
});

async function loadReport() {
  const sheetName = document.getElementById('sheet-select').value;
  setLoading(document.getElementById('sa-table'));

  const res = await Api.get('getSAReport', { sheetName });
  if (!res.ok) {
    document.getElementById('sa-table').innerHTML =
      `<div class="alert alert-danger" style="margin:1rem;">โหลดไม่ได้: ${res.error}</div>`;
    return;
  }
  renderSATable(res.data);
}

function renderSATable(data) {
  const rows = (data.summary || []).filter(r => r.sa && r.brand);
  const el   = document.getElementById('sa-table');

  // Update KPIs
  const fmt  = n => Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
  const fmtK = n => { const v = Number(n||0); return v >= 1000 ? (v/1000).toFixed(1)+'K' : v.toFixed(0); };

  document.getElementById('k-tp').textContent     = rows.reduce((s,r)=>s+r.tp,0);
  document.getElementById('k-jobs').textContent   = rows.reduce((s,r)=>s+r.jobsOpened,0);
  document.getElementById('k-labor').textContent  = fmtK(rows.reduce((s,r)=>s+r.labor,0));
  document.getElementById('k-revenue').textContent= fmtK(rows.reduce((s,r)=>s+r.grandTotal,0));

  if (rows.length === 0) { setEmpty(el, 'ไม่มีข้อมูล'); return; }

  el.innerHTML = `<table>
    <thead><tr>
      <th>Brand</th><th>SA / ช่าง</th>
      <th style="text-align:center">TP</th>
      <th style="text-align:center">เปิด Job</th>
      <th style="text-align:center">ปิด Job</th>
      <th style="text-align:right">ค่าแรง</th>
      <th style="text-align:right">อะไหล่</th>
      <th style="text-align:right">ยาง/น้ำมัน</th>
      <th style="text-align:right">APP</th>
      <th style="text-align:right">ACC</th>
      <th style="text-align:right">PDI</th>
      <th style="text-align:right">รวม</th>
    </tr></thead>
    <tbody>
    ${rows.map(r => {
      const isTotal = r.brand.includes('Total');
      const style   = isTotal ? 'font-weight:700;background:var(--light);' : '';
      return `<tr style="${style}">
        <td>${isTotal ? '📊 ' : ''}<strong>${r.brand}</strong></td>
        <td>${r.sa}</td>
        <td style="text-align:center">${r.tp || '—'}</td>
        <td style="text-align:center">${r.jobsOpened || '—'}</td>
        <td style="text-align:center">${r.jobsClosed || '—'}</td>
        <td style="text-align:right">${r.labor ? fmt(r.labor) : '—'}</td>
        <td style="text-align:right">${r.parts ? fmt(r.parts) : '—'}</td>
        <td style="text-align:right">${r.tires ? fmt(r.tires) : '—'}</td>
        <td style="text-align:right">${r.app   ? fmt(r.app)   : '—'}</td>
        <td style="text-align:right">${r.acc   ? fmt(r.acc)   : '—'}</td>
        <td style="text-align:center">${r.pdi  ? r.pdi        : '—'}</td>
        <td style="text-align:right"><strong style="color:var(--success)">${r.grandTotal ? fmt(r.grandTotal) : '—'}</strong></td>
      </tr>`;
    }).join('')}
    </tbody>
    <tfoot style="background:var(--secondary);color:white;">
      <tr>
        <td colspan="2"><strong>Grand Total</strong></td>
        <td style="text-align:center"><strong>${rows.reduce((s,r)=>s+r.tp,0)}</strong></td>
        <td style="text-align:center"><strong>${rows.reduce((s,r)=>s+r.jobsOpened,0)}</strong></td>
        <td style="text-align:center"><strong>${rows.reduce((s,r)=>s+r.jobsClosed,0)}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.labor,0))}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.parts,0))}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.tires,0))}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.app,0))}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.acc,0))}</strong></td>
        <td style="text-align:center"><strong>${rows.reduce((s,r)=>s+r.pdi,0)}</strong></td>
        <td style="text-align:right"><strong>${fmt(rows.reduce((s,r)=>s+r.grandTotal,0))}</strong></td>
      </tr>
    </tfoot>
  </table>`;
}

async function loadManagerTargets() {
  const el  = document.getElementById('target-table');
  const res = await Api.get('getManagerSummary');
  if (!res.ok) { setEmpty(el, 'โหลดข้อมูลเป้าหมายไม่ได้'); return; }

  const allStaff = [];
  (res.data || []).forEach(branch => {
    branch.staff.forEach(s => allStaff.push({ ...s, branch: branch.branch }));
  });

  if (allStaff.length === 0) { setEmpty(el, 'ไม่มีข้อมูลเป้าหมาย'); return; }

  const fmt = n => Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});

  el.innerHTML = `<table>
    <thead><tr>
      <th>สาขา</th><th>ชื่อ</th><th>ประเภท</th>
      <th style="text-align:right">เป้า</th>
      <th style="text-align:right">ทำได้</th>
      <th style="text-align:right">%</th>
      <th>Progress</th>
    </tr></thead>
    <tbody>${allStaff.map(s => {
      const pct = s.percent || 0;
      const barColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--yellow)' : 'var(--primary)';
      return `<tr>
        <td>${badge(s.branch, 'blue')}</td>
        <td><strong>${s.name}</strong></td>
        <td>${s.type ? badge(s.type, 'gray') : '—'}</td>
        <td style="text-align:right">${fmt(s.target)}</td>
        <td style="text-align:right">${fmt(s.actual)}</td>
        <td style="text-align:right;font-weight:700;color:${barColor}">${pct.toFixed(1)}%</td>
        <td style="min-width:100px;">
          <div style="background:var(--border);border-radius:4px;height:6px;">
            <div style="width:${Math.min(pct,100)}%;background:${barColor};height:100%;border-radius:4px;"></div>
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}
</script>
</body>
</html>
